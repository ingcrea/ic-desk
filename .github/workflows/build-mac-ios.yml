name: Compilar y Firmar Releases (macOS & iOS)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-mac-ios:
    name: Compilar y Firmar Release (macOS & iOS)
    runs-on: macos-latest

    steps:
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      - name: Instalar Certificados y Perfiles de Firma de Apple
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # 1. Crear variables de ruta temporales
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # 2. Decodificar Certificado y Perfil desde Secrets de GitHub
          if [ -n "$BUILD_CERTIFICATE_BASE64" ]; then
            echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
            echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

            # 3. Crear Llavero (Keychain) temporal en el Runner de macOS
            security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

            # 4. Importar certificado .p12 al llavero
            security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

            # 5. Instalar Perfil de Aprovisionamiento de Apple
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

            echo "Certificados de firma instalados correctamente."
          else
            echo "Aviso: Ejecutando en modo compilación sin firma (Secrets pendientes)."
          fi

      - name: Preparar Entorno Swift & Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Compilar Binario Nativo de macOS (Release)
        run: |
          cd Mac
          swift build -c release
          mkdir -p build/release
          cp -r .build/release/ICDeskMac build/release/IC-Desk-Mac
          cd build/release
          zip -r IC-Desk-macOS-Release.zip IC-Desk-Mac

      - name: Generar Artifact Release de macOS
        uses: actions/upload-artifact@v4
        with:
          name: IC-Desk-macOS-Release
          path: Mac/build/release/IC-Desk-macOS-Release.zip

      - name: Empaquetar Código de iOS (App Group Ready)
        run: |
          cd Mac
          mkdir -p build/release-ios
          zip -r build/release-ios/IC-Desk-iOS-Source.zip Shared/ iOS/ Package.swift AppEntry.swift ICDesk_AppStore_Profile.mobileprovision

      - name: Generar Artifact Release de iOS
        uses: actions/upload-artifact@v4
        with:
          name: IC-Desk-iOS-Release
          path: Mac/build/release-ios/IC-Desk-iOS-Source.zip
