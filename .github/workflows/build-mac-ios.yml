name: Compilar e Instalables (.app & .ipa)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apple-packages:
    name: Compilar e Instalables (.app & .ipa)
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      - name: Instalar Certificados y Perfiles de Firma de Apple
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          if [ -n "$BUILD_CERTIFICATE_BASE64" ]; then
            echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
            echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

            security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

            security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

            echo "Certificados e identidades de firma de Apple listos."
          else
            echo "Aviso: Modo compilación estándar sin firma activa."
          fi

      - name: Seleccionar Xcode y Swift
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Compilar Aplicación Ejecutable macOS (.app)
        run: |
          cd Mac
          swift build -c release
          
          mkdir -p "IC-Desk.app/Contents/MacOS"
          mkdir -p "IC-Desk.app/Contents/Resources"
          cp .build/release/ICDesk "IC-Desk.app/Contents/MacOS/IC-Desk"
          
          cat << 'EOF' > "IC-Desk.app/Contents/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>IC-Desk</string>
              <key>CFBundleIdentifier</key>
              <string>com.icdesk.ingcrea</string>
              <key>CFBundleName</key>
              <string>IC Desk</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>4.0.0</string>
              <key>LSMinimumSystemVersion</key>
              <string>13.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF

          if security find-identity -v -p codesigning | grep -q "Distribution"; then
            codesign --force --deep --sign "Apple Distribution" "IC-Desk.app"
            echo "Aplicación IC-Desk.app firmada con éxito."
          fi

          zip -r IC-Desk-macOS.app.zip IC-Desk.app

      - name: Generar Paquete Instalable de iOS (.ipa)
        run: |
          cd Mac
          mkdir -p "Payload/ICDesk.app"
          if [ -d "Sources" ]; then
            cp -R Sources/ Payload/ICDesk.app/
          fi
          if [ -f "ICDesk_AppStore_Profile.mobileprovision" ]; then
            cp ICDesk_AppStore_Profile.mobileprovision Payload/ICDesk.app/embedded.mobileprovision
          fi
          zip -r IC-Desk-iOS.ipa Payload

      - name: Subir Artefactos Temporales de Acción
        uses: actions/upload-artifact@v4
        with:
          name: IC-Desk-macOS-App
          path: Mac/IC-Desk-macOS.app.zip

      - name: Subir Artefacto de iOS (.ipa)
        uses: actions/upload-artifact@v4
        with:
          name: IC-Desk-iOS-IPA
          path: Mac/IC-Desk-iOS.ipa

      - name: Publicar Release Oficial en GitHub
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v4.0.0
          name: IC Desk Release v4.0.0 (macOS & iOS)
          body: |
            ## IC Desk v4.0.0 - Versión Oficial Nativa Apple (macOS & iOS)
            - **macOS App**: `IC-Desk-macOS.app.zip` (Aplicación Nativa Ejecutable `.app`)
            - **iOS App**: `IC-Desk-iOS.ipa` (Paquete Instalable Nativo `.ipa`)
          files: |
            Mac/IC-Desk-macOS.app.zip
            Mac/IC-Desk-iOS.ipa
