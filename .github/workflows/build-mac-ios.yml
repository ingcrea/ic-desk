name: Compilar y Firmar Sercom Desk (macOS & iOS)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-apple:
    name: Compilar y Firmar (macOS & iOS)
    runs-on: macos-latest

    steps:
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      - name: Instalar Certificados y Perfiles de Firma de Apple
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # 1. Crear variables de ruta temporales
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # 2. Decodificar Certificado y Perfil desde Secrets de GitHub
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # 3. Crear Llavero (Keychain) temporal en el Runner de macOS
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # 4. Importar certificado .p12 al llavero
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # 5. Instalar Perfil de Aprovisionamiento de Apple
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

          echo "Certificado de Firma y Perfil de Apple instalados con éxito en el Runner."

      - name: Preparar Entorno Swift / Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Compilar Proyecto para macOS (Si existe proyecto Xcode en Mac/)
        run: |
          if [ -d "Mac" ] && [ -f "Mac/ICDesk.xcodeproj" ]; then
            xcodebuild -project Mac/ICDesk.xcodeproj -scheme ICDesk -configuration Release -destination 'platform=macOS' CODE_SIGN_STYLE="Manual" PROVISIONING_PROFILE_SPECIFIER="ICDesk_AppStore_Profile" build
          else
            echo "Directorio Mac preparado para recibir proyecto Xcode nativo."
          fi

      - name: Subir Artifacts de Firma (macOS & iOS)
        uses: actions/upload-artifact@v4
        with:
          name: ICDesk-Apple-Signed
          path: |
            Mac/*.mobileprovision
