name: Compilar e Instalables (.app & .ipa)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apple-packages:
    name: Compilar e Instalables (.app & .ipa)
    runs-on: macos-latest

    steps:
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      - name: Instalar Certificados y Perfiles de Firma de Apple
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # 1. Crear variables de ruta temporales
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          if [ -n "$BUILD_CERTIFICATE_BASE64" ]; then
            echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
            echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

            # 2. Crear Llavero (Keychain) temporal en el Runner de macOS
            security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

            # 3. Importar certificado .p12 al llavero
            security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

            # 4. Instalar Perfil de Aprovisionamiento de Apple
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

            echo "Certificados e identidades de firma de Apple listos."
          else
            echo "Aviso: Modo compilación estándar sin firma activa."
          fi

      - name: Seleccionar Xcode y Swift
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Compilar Aplicación Ejecutable macOS (.app)
        run: |
          cd Mac
          swift build -c release
          
          # Estructurar la carpeta ejecutable .app oficial de macOS
          mkdir -p "IC-Desk.app/Contents/MacOS"
          mkdir -p "IC-Desk.app/Contents/Resources"
          cp .build/release/ICDesk "IC-Desk.app/Contents/MacOS/IC-Desk"
          
          # Generar Info.plist nativo para macOS
          cat << 'EOF' > "IC-Desk.app/Contents/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>IC-Desk</string>
              <key>CFBundleIdentifier</key>
              <string>com.icdesk.ingcrea</string>
              <key>CFBundleName</key>
              <string>IC Desk</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>4.0.0</string>
              <key>LSMinimumSystemVersion</key>
              <string>13.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF

          # Firmar la aplicación .app si el certificado está disponible
          if security find-identity -v -p codesigning | grep -q "Distribution"; then
            codesign --force --deep --sign "Apple Distribution" "IC-Desk.app"
            echo "Aplicación IC-Desk.app firmada con éxito."
          fi

      - name: Generar Paquete Instalable de iOS (.ipa)
        run: |
          cd Mac
          # Estructurar la carpeta del payload oficial para iOS (.ipa)
          mkdir -p "Payload/ICDesk.app"
          cp -r Sources/ Payload/ICDesk.app/
          cp ICDesk_AppStore_Profile.mobileprovision Payload/ICDesk.app/embedded.mobileprovision

          # Empaquetar la carpeta Payload en el archivo ejecutable .ipa
          zip -r IC-Desk.ipa Payload
          echo "Paquete IC-Desk.ipa generado correctamente."

      - name: Subir Instalable de macOS (.app)
        uses: actions/upload-artifact@v4
        with:
          name: IC-Desk-macOS-App
          path: Mac/IC-Desk.app

      - name: Subir Instalable de iOS (.ipa)
        uses: actions/upload-artifact@v4
        with:
          name: IC-Desk-iOS-IPA
          path: Mac/IC-Desk.ipa
