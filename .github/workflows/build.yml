name: Compilar Sercom Desk

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      - name: Inyectar Secretos de Producción en Caliente
        shell: pwsh
        run: |
          $csFile = "Windows/IcDesk.cs"
          if (-not (Test-Path $csFile)) { $csFile = "Windows/SoporteRemotoGUI.cs" }
          if (Test-Path $csFile) {
            $content = Get-Content $csFile -Raw
            $content = $content -replace "SERVER_URL_PLACEHOLDER", "${{ secrets.SERCOM_SERVER_URL }}"
            $content = $content -replace "RELAY_WS_PLACEHOLDER", "${{ secrets.SERCOM_RELAY_WS_URL }}"
            $content = $content -replace "AGENT_TOKEN_PLACEHOLDER", "${{ secrets.SERCOM_AGENT_TOKEN }}"
            Set-Content $csFile -Value $content -NoNewline
            Write-Output "Secretos inyectados de forma segura en $csFile antes de compilar."
          } else {
            Write-Output "Continuando compilación estándar."
          }

      - name: Compilar Agente .exe (MSBuild)
        run: |
          if (Test-Path "Windows/IcDesk.cs") {
            C:\Windows\Microsoft.NET\Framework\v4.0.30319\csc.exe /target:winexe /out:Windows/IC-Desk.exe /win32icon:favicon.ico Windows/IcDesk.cs
          }

      - name: Subir Binario Compilado Temporal
        uses: actions/upload-artifact@v4
        with:
          name: IC-Desk-Windows
          path: Windows/*.exe
